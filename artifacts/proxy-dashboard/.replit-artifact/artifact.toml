kind = "web"
previewPath = "/"
title = "代理管理面板"
version = "1.0.0"
id = "artifacts/proxy-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24039

[services.development]
run = "pnpm --filter @workspace/proxy-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proxy-dashboard", "run", "build" ]
publicDir = "artifacts/proxy-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24039"
BASE_PATH = "/"
